name: 🤖 News Brain Daily Agent

on:
  schedule:
    # 2:00 AM UTC = 7:30 AM IST — runs before your work day
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Lets you click "Run" manually from GitHub Actions tab anytime

permissions:
  contents: write   # needed to commit data.json back to repo

jobs:
  update-earnings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run News Brain Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python agent.py

      - name: Commit updated data.json
        run: |
          git config --global user.name  "News Brain Agent"
          git config --global user.email "agent@news-brain.ai"
          git add data.json
          git diff --staged --quiet \
            || git commit -m "🤖 Auto-update: earnings dates $(date +%Y-%m-%d)" \
            && git push
