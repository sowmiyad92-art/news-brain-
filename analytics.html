<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 News Brain — Analytics</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #f7fafc; color: #2d3748; min-height: 100vh; }

  .header {
    background: linear-gradient(135deg, #2b6cb0, #3182ce);
    color: #fff; padding: 20px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header a {
    color: #bee3f8; text-decoration: none; font-size: 13px;
    padding: 6px 14px; border: 1px solid #bee3f8; border-radius: 6px;
  }
  .header a:hover { background: rgba(255,255,255,0.15); }

  .container { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }

  /* ── Stat cards ── */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
           gap: 16px; margin-bottom: 28px; }
  .card {
    background: #fff; border-radius: 12px; padding: 20px 22px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    border-left: 4px solid #3182ce;
  }
  .card.green  { border-color: #38a169; }
  .card.orange { border-color: #dd6b20; }
  .card.red    { border-color: #e53e3e; }
  .card.purple { border-color: #805ad5; }
  .card-val  { font-size: 32px; font-weight: 800; margin-bottom: 4px; }
  .card-label{ font-size: 12px; color: #718096; font-weight: 500; }

  /* ── Section ── */
  .section {
    background: #fff; border-radius: 12px; padding: 22px 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 22px;
  }
  .section h2 { font-size: 15px; font-weight: 700; margin-bottom: 18px;
                color: #2d3748; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; }

  /* ── Bar chart ── */
  .bar-row { display: flex; align-items: center; gap: 10px;
             margin-bottom: 10px; font-size: 13px; }
  .bar-label { width: 100px; text-align: right; color: #4a5568; flex-shrink: 0; }
  .bar-track { flex: 1; background: #edf2f7; border-radius: 6px; height: 24px;
               overflow: hidden; position: relative; }
  .bar-fill  { height: 100%; border-radius: 6px; display: flex; align-items: center;
               padding-left: 8px; font-size: 11px; font-weight: 700; color: #fff;
               transition: width 0.6s ease; min-width: 32px; }
  .bar-count { font-size: 12px; color: #718096; width: 28px; flex-shrink: 0; }

  /* ── Region bars ── */
  .region-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* ── Upcoming table ── */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 12px; background: #f7fafc;
       color: #718096; font-size: 11px; font-weight: 600;
       text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid #e2e8f0; }
  td { padding: 10px 12px; border-bottom: 1px solid #f0f4f8; color: #2d3748; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f7fafc; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 600;
  }
  .badge-soon   { background: #fef3c7; color: #92400e; }
  .badge-near   { background: #e6fffa; color: #234e52; }
  .badge-today  { background: #fed7d7; color: #c53030; }
  .badge-overdue{ background: #fff5f5; color: #c53030; }
  .badge-region { background: #ebf8ff; color: #2c5282; }

  .cal-link {
    display: inline-block; padding: 3px 9px; background: #3182ce;
    color: #fff; border-radius: 5px; text-decoration: none; font-size: 11px;
    font-weight: 600;
  }
  .cal-link:hover { background: #2b6cb0; }

  .loading { text-align: center; padding: 60px; color: #a0aec0; font-size: 14px; }
  .error   { text-align: center; padding: 40px; color: #e53e3e; }
</style>
</head>
<body>

<div class="header">
  <h1>📊 News Brain — Analytics</h1>
  <a href="./index.html">← Back to Dashboard</a>
</div>

<div class="container">
  <div id="root"><div class="loading">⏳ Loading analytics…</div></div>
</div>

<script>
// ── Colour palette for months ──────────────────────────────────
const MONTH_COLORS = [
  '#3182ce','#38a169','#dd6b20','#805ad5',
  '#d53f8c','#2c7a7b','#b7791f','#c53030',
  '#2b6cb0','#276749','#744210','#553c9a'
];

const REGION_COLORS = {
  'North America': '#3182ce',
  'Europe':        '#38a169',
  'Asia':          '#dd6b20',
  'Latin America': '#805ad5',
  'Africa':        '#d53f8c',
  'Middle East':   '#2c7a7b',
};

// ── Main ──────────────────────────────────────────────────────
async function init() {
  try {
    const [dataRes, logRes] = await Promise.all([fetch('./data.json'), fetch('./agent_log.json')]);
    const agentLog = logRes.ok ? await logRes.json() : null;
    const data = await dataRes.json();

    const companies  = data.companies || (Array.isArray(data) ? data : []);
    const announced  = data.announcedDates || {};
    const lsAnn      = safeJSON(localStorage.getItem('announcedDates'), {});
    const allAnn     = { ...announced, ...lsAnn };
    
    // merge localStorage dates
    const lsCompanies = safeJSON(localStorage.getItem('companiesData'), []);
    if (lsCompanies.length > 0) {
      const lsMap = {};
      for (const c of lsCompanies) lsMap[c.name] = c;
      for (const c of companies) {
        const ls = lsMap[c.name];
        if (!ls) continue;
        if (ls.lastAnnouncement && ls.lastAnnouncement > (c.lastAnnouncement || ''))
          c.lastAnnouncement = ls.lastAnnouncement;
        if (ls.expectedNext && ls.expectedNext > (c.expectedNext || ''))
          c.expectedNext = ls.expectedNext;
      }
    }
    render(companies, allAnn, agentLog);
  } catch(e) {
    document.getElementById('root').innerHTML =
      `<div class="error">❌ Could not load data.json<br><small>${e.message}</small></div>`;
  }
}

function safeJSON(str, fallback) {
  try { return JSON.parse(str||'null') || fallback; } catch(_) { return fallback; }
}

async function render(companies, allAnn, agentLog) {
  const today     = new Date(); today.setHours(0,0,0,0);
  const todayStr  = fmt(today);
  const in30      = new Date(today); in30.setDate(in30.getDate()+30);

  // ── Monthly announcement buckets ──
  const monthly = {};
  for (const c of companies) {
    if (!c.lastAnnouncement) continue;
    const d = new Date(c.lastAnnouncement);
    if (isNaN(d)) continue;
    const key = d.toLocaleString('en-US',{month:'long',year:'numeric'});
    monthly[key] = (monthly[key]||0) + 1;
  }
  // sort by date
  const monthKeys = Object.keys(monthly).sort((a,b)=>new Date(a)-new Date(b));
  const maxM = Math.max(...Object.values(monthly), 1);

  // ── Region breakdown ──
  const regions = {};
  for (const c of companies) {
    const r = c.region || 'Unknown';
    regions[r] = (regions[r]||0) + 1;
  }

  // ── Upcoming earnings ──
  const upcoming = [];
  for (const c of companies) {
    const annDate = allAnn[c.name]?.date;
    if (!annDate) continue;
    const dt = new Date(annDate); dt.setHours(0,0,0,0);
    const diff = Math.round((dt-today)/86400000);
    if (diff >= -1 && dt <= in30) {
      upcoming.push({ name:c.name, region:c.region||'', date:annDate,
                      diff, irWebsite: c.irWebsite||'#' });
    }
  }
  upcoming.sort((a,b)=>a.diff-b.diff);

  // ── Overdue ──
  const overdue = companies
    .filter(c => {
      if (!c.lastAnnouncement) return false;
      const d = new Date(c.lastAnnouncement);
      return !isNaN(d) && Math.round((today-d)/86400000) > 180;
    })
    .sort((a,b) => new Date(a.lastAnnouncement)-new Date(b.lastAnnouncement));

  // ── Summary counts ──
  const totalUpcoming30 = upcoming.filter(u=>u.diff>=0).length;
  const reportedThisMonth = (() => {
    const now = new Date();
    return companies.filter(c => {
      if (!c.lastAnnouncement) return false;
      const d = new Date(c.lastAnnouncement);
      return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
    }).length;
  })();

  document.getElementById('root').innerHTML = `

    <!-- ── Cards ── -->
    <div class="cards">
      <div class="card">
        <div class="card-val">${companies.length}</div>
        <div class="card-label">Total Companies</div>
      </div>
      <div class="card green">
        <div class="card-val">${reportedThisMonth}</div>
        <div class="card-label">Reported This Month</div>
      </div>
      <div class="card orange">
        <div class="card-val">${totalUpcoming30}</div>
        <div class="card-label">Upcoming (30 days)</div>
      </div>
      <div class="card red">
        <div class="card-val">${overdue.length}</div>
        <div class="card-label">Overdue 180d+</div>
      </div>
      <div class="card purple">
        <div class="card-val">${Object.keys(allAnn).length}</div>
        <div class="card-label">Confirmed Dates</div>
      </div>
    </div>

    <!-- ── Monthly breakdown ── -->
    <div class="section">
      <h2>📅 Announcements by Month</h2>
      ${monthKeys.map((key,i) => {
        const count = monthly[key];
        const pct   = Math.round((count/maxM)*100);
        const color = MONTH_COLORS[i % MONTH_COLORS.length];
        return `
          <div class="bar-row">
            <div class="bar-label">${key}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${pct}%;background:${color};">
                ${count >= 3 ? count+' co.' : ''}
              </div>
            </div>
            <div class="bar-count">${count}</div>
          </div>`;
      }).join('')}
    </div>

    <!-- ── Region breakdown ── -->
    <div class="section">
      <h2>🌍 Companies by Region</h2>
      <div class="region-grid">
        ${Object.entries(regions).sort((a,b)=>b[1]-a[1]).map(([r,n])=>{
          const pct = Math.round((n/companies.length)*100);
          const col = REGION_COLORS[r]||'#718096';
          return `
            <div class="bar-row">
              <div class="bar-label" style="width:120px">${r}</div>
              <div class="bar-track">
                <div class="bar-fill" style="width:${Math.max(pct,8)}%;background:${col};">
                  ${n >= 3 ? n : ''}
                </div>
              </div>
              <div class="bar-count">${n}</div>
            </div>`;
        }).join('')}
      </div>
    </div>

    <!-- ── Upcoming earnings ── -->
    <div class="section">
      <h2>📌 Confirmed Upcoming Earnings (next 30 days)</h2>
      ${upcoming.length === 0
        ? '<p style="color:#a0aec0;font-size:13px;">No confirmed upcoming dates in next 30 days.</p>'
        : `<table>
            <thead><tr>
              <th>Company</th><th>Region</th><th>Date</th><th>Status</th><th>Calendar</th>
            </tr></thead>
            <tbody>
            ${upcoming.map(u => {
              const calDate = u.date.replace(/-/g,'');
              const calUrl  = `https://calendar.google.com/calendar/render?action=TEMPLATE`
                            + `&text=${encodeURIComponent(u.name+' Earnings')}`
                            + `&dates=${calDate}/${calDate}`
                            + `&details=${encodeURIComponent('Earnings. IR: '+u.irWebsite)}`;
              let badge = '';
              if (u.diff === 0)        badge = `<span class="badge badge-today">TODAY</span>`;
              else if (u.diff === 1)   badge = `<span class="badge badge-soon">Tomorrow</span>`;
              else if (u.diff <= 7)    badge = `<span class="badge badge-soon">${u.diff}d</span>`;
              else                     badge = `<span class="badge badge-near">${u.diff}d</span>`;
              return `<tr>
                <td><strong>${u.name}</strong></td>
                <td><span class="badge badge-region">${u.region}</span></td>
                <td>${u.date}</td>
                <td>${badge}</td>
                <td><a href="${calUrl}" target="_blank" class="cal-link">📅 Add</a></td>
              </tr>`;
            }).join('')}
            </tbody>
          </table>`
      }
    </div>

    <!-- ── Overdue ── -->
    ${overdue.length > 0 ? `
    <div class="section">
      <h2>⚠️ Overdue Companies (180+ days since last announcement)</h2>
      <table>
        <thead><tr><th>Company</th><th>Region</th><th>Last Announcement</th><th>Days Overdue</th></tr></thead>
        <tbody>
        ${overdue.map(c => {
          const days = Math.round((today - new Date(c.lastAnnouncement))/86400000);
          return `<tr>
            <td><strong>${c.name}</strong></td>
            <td><span class="badge badge-region">${c.region||''}</span></td>
            <td>${c.lastAnnouncement}</td>
            <td><span class="badge badge-overdue">${days}d</span></td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>
    </div>` : ''}

   ${renderAgentLog(agentLog)}

   <div style="text-align:center;color:#a0aec0;font-size:12px;padding:16px 0;">
      Last updated: ${new Date().toLocaleString()} · 
      <a href="./index.html" style="color:#3182ce;">← Back to Dashboard</a>
    </div>
  `;

  
}


function renderAgentLog(log) {
  if (!log || !log.runs || log.runs.length === 0) {
    return `<div class="section">
      <h2>🤖 Agent Run Log</h2>
      <p style="color:#a0aec0;font-size:13px;">No agent runs recorded yet. agent_log.json not found.</p>
    </div>`;
  }

  const runs = [...log.runs].reverse().slice(0, 14); // latest 14 runs
  const sources = runs[0]?.sourceBreakdown || {};

  // Coverage gap: companies with no data in last run
  const gaps = log.runs[log.runs.length - 1]?.noData || [];

  return `
    <div class="section">
      <h2>🤖 Agent Run Log (last ${runs.length} runs)</h2>

      <table>
        <thead><tr>
          <th>Date</th><th>Updated</th><th>No Data</th><th>Cleared Stale</th><th>Sources</th>
        </tr></thead>
        <tbody>
        ${runs.map(r => `<tr>
          <td>${r.date}</td>
          <td><span style="color:#38a169;font-weight:700;">${r.updated}</span></td>
          <td><span style="color:#e53e3e;">${r.noData?.length ?? 0}</span></td>
          <td>${r.cleared ?? 0}</td>
          <td style="font-size:11px;color:#718096;">
            RSS:${r.sourceBreakdown?.rss??0} 
            IR:${r.sourceBreakdown?.ir??0} 
            yf:${r.sourceBreakdown?.yfinance??0} 
            Groq:${r.sourceBreakdown?.groq??0}
          </td>
        </tr>`).join('')}
        </tbody>
      </table>

      ${gaps.length > 0 ? `
        <div style="margin-top:18px;">
          <div style="font-size:12px;font-weight:600;color:#718096;margin-bottom:8px;">
            ⚠️ Coverage gaps in last run (${gaps.length} companies with no data):
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            ${gaps.map(n => `<span style="background:#fff5f5;border:1px solid #fed7d7;
              color:#c53030;padding:2px 10px;border-radius:12px;font-size:12px;">${n}</span>`).join('')}
          </div>
        </div>` : ''}
    </div>
  `;
}

function fmt(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

init();
</script>
</body>
</html>
